# Fixed by our project design and not tuned
max_length: 256 # EDA has our sequence lengths for the dataset max was 141. 
cv_k: 5 # our split strategy 
cv_seed: 7 #This is the seed for our folds logic
eval_strategy: "epoch" #reflects our approach
save_strategy: "epoch" #reflects our approach
load_best_model_at_end: true
metric_for_best_model: "macro_f1" #Our agreed metric for the project
greater_is_better: true #because f1 is set for the metric this is true anyways. Higher F1 the better model is saved
early_stopping_patience: 3 # I just chose this so we can have some protection during training
fp16: true #The DGX Spark supports it and we'll need it for quantinization
seed: 42 # keeping us consistent for the trainer
report_to: "none" # researched this isn't useful until after we complete hypertuning
optim: "adamw_torch_fused" #by #T5 fixed their optimizer ours defaults here.

#current search space best trial RoBERTa-base, 5 fold, Optuna trial 49 f1 = 0.58252
learning_rate: 2.5873758209424307e-05
per_device_train_batch_size: 8
weight_decay: 0.08645440342049153
warmup_ratio: 0.05761304616532463
num_train_epochs: 19